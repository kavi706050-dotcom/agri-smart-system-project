<!DOCTYPE html>
<html>
<head>
<title>Farmer</title>
<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') no-repeat center/cover;
    min-height:100vh;
}
.overlay{
    background:rgba(0,0,0,0.6);
    min-height:100vh;
    padding:30px;
}
.container{
    max-width:1100px;
    margin:auto;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:18px;
    color:white;
}
input,button{
    padding:12px;
    border-radius:12px;
    border:none;
}
button{
    background:linear-gradient(135deg,#00ffcc,#00bfff);
    font-weight:bold;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th,td{
    padding:12px;
    text-align:center;
}
</style>
</head>

<body>
<div class="overlay">
<div class="container">

<h2>Farmer Dashboard</h2>

<form method="POST">
    <input name="crop_name" placeholder="Crop Name" required>
    <input name="quantity" type="number" placeholder="Quantity" required>
    <input name="price" type="number" step="0.01" placeholder="Price" required>
    <button>Add Crop</button>
</form>

<table>
<tr><th>ID</th><th>Crop</th><th>Quantity</th><th>Price</th></tr>
{% for crop in crops %}
<tr>
<td>{{ crop[0] }}</td>
<td>{{ crop[1] }}</td>
<td>{{ crop[2] }}</td>
<td>₹ {{ crop[3] }}</td>
</tr>
{% endfor %}
</table>

</div>
</div>
</body>
</html>
