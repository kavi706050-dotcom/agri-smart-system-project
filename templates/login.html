<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:url('https://images.unsplash.com/photo-1500382017468-9049fed747ef') no-repeat center/cover;
    height:100vh;
}
.overlay{
    height:100vh;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
}
.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    padding:35px;
    border-radius:18px;
    width:350px;
    text-align:center;
    color:white;
}
select,button{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-top:15px;
    font-size:15px;
}
button{
    background:linear-gradient(135deg,#00ffcc,#00bfff);
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="overlay">
<div class="card">
<h2>Agri Smart System</h2>

<form method="POST">
    <select name="role" required>
        <option value="">Select Role</option>
        <option value="farmer">Farmer</option>
        <option value="buyer">Buyer</option>
        <option value="admin">Admin</option>
    </select>
    <button type="submit">Login</button>
</form>

</div>
</div>
</body>
</html>
